<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recipes">
<meta name="theme-color" content="#0b1121">
<title>Recipe Book</title>
<style>
/* ===== CSS CUSTOM PROPERTIES (DARK/LIGHT THEME) ===== */
:root {
  --bg-primary: #0b1121;
  --bg-card: rgba(15,23,42,0.6);
  --bg-card-sub: rgba(15,23,42,0.35);
  --bg-card-border: rgba(148,163,184,0.07);
  --bg-input: #0f172a;
  --bg-bar: rgba(11,17,33,0.97);
  --bg-sheet: #1e293b;
  --bg-empty: rgba(15,23,42,0.4);
  --bg-empty-border: rgba(148,163,184,0.05);
  --text-primary: #e2e8f0;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --text-faint: #475569;
  --border-input: #334155;
  --accent: #10b981;
  --accent-light: #6ee7b7;
  --accent-bg: rgba(16,185,129,0.15);
  --accent-border: rgba(16,185,129,0.3);
  --danger: #ef4444;
  --danger-bg: rgba(239,68,68,0.1);
  --danger-border: rgba(239,68,68,0.2);
  --blue: #3b82f6;
  --blue-light: #60a5fa;
  --blue-bg: rgba(59,130,246,0.15);
  --blue-border: rgba(59,130,246,0.3);
  --overlay-bg: rgba(0,0,0,0.5);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f8fafc;
    --bg-card: rgba(255,255,255,0.8);
    --bg-card-sub: rgba(241,245,249,0.8);
    --bg-card-border: rgba(148,163,184,0.15);
    --bg-input: #ffffff;
    --bg-bar: rgba(248,250,252,0.97);
    --bg-sheet: #ffffff;
    --bg-empty: rgba(241,245,249,0.8);
    --bg-empty-border: rgba(148,163,184,0.1);
    --text-primary: #0f172a;
    --text-secondary: #1e293b;
    --text-muted: #475569;
    --text-dim: #64748b;
    --text-faint: #94a3b8;
    --border-input: #cbd5e1;
    --accent: #059669;
    --accent-light: #10b981;
    --accent-bg: rgba(5,150,105,0.1);
    --accent-border: rgba(5,150,105,0.3);
    --danger: #dc2626;
    --danger-bg: rgba(220,38,38,0.08);
    --danger-border: rgba(220,38,38,0.2);
    --blue: #2563eb;
    --blue-light: #3b82f6;
    --blue-bg: rgba(37,99,235,0.1);
    --blue-border: rgba(37,99,235,0.3);
    --overlay-bg: rgba(0,0,0,0.3);
  }
}

/* ===== RESET + BODY ===== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, system-ui, sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh; min-height: 100dvh;
  padding-top: max(16px, env(safe-area-inset-top));
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  transition: background 0.2s;
}
.wrap { max-width: 640px; margin: 0 auto; padding: 0 16px; }

/* ===== TOAST ===== */
.toast {
  position: fixed; top: max(16px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
  z-index: 2000; max-width: 90vw; text-align: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.ok { background: rgba(6,78,59,0.95); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
.toast.err { background: rgba(127,29,29,0.95); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.toast.show { opacity: 1; }

/* ===== OFFLINE BANNER ===== */
.offline-banner {
  display: none; padding: 8px 16px; background: rgba(120,53,15,0.95);
  color: #fde68a; font-size: 12px; font-weight: 600; text-align: center;
  border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(251,191,36,0.3);
}
.offline-banner.show { display: block; }

/* ===== VIEW HEADER ===== */
.view-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0 14px;
}
.view-title { font-size: 28px; font-weight: 800; color: var(--text-primary); }
.header-btn {
  background: var(--accent-bg); border: 1px solid var(--accent-border);
  color: var(--accent); width: 40px; height: 40px;
  border-radius: 12px; font-size: 22px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.header-btn:active { opacity: 0.7; }

/* ===== SEARCH ===== */
.search-field {
  width: 100%; padding: 12px 16px; border: 1px solid var(--border-input);
  border-radius: 12px; font-size: 16px; outline: none;
  background: var(--bg-input); color: var(--text-primary); min-height: 48px;
  -webkit-appearance: none; font-family: inherit; margin-bottom: 12px;
}
.search-field::placeholder { color: var(--text-faint); }
.search-field:focus { border-color: var(--accent); }

/* ===== FILTER PILLS ===== */
.filter-section { margin-bottom: 8px; }
.filter-label {
  font-size: 11px; color: var(--text-dim); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 6px; padding-left: 2px;
}
.filter-row {
  display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 4px; scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
  border: 1px solid var(--bg-card-border); background: var(--bg-card-sub);
  color: var(--text-muted); cursor: pointer; white-space: nowrap; font-family: inherit;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.filter-pill:active { opacity: 0.7; }
.filter-pill.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.filters-area { margin-bottom: 12px; }

/* ===== RECIPE CARDS ===== */
.recipe-card {
  background: var(--bg-card); border: 1px solid var(--bg-card-border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
  cursor: pointer; -webkit-user-select: none; user-select: none;
  transition: transform 0.1s, background 0.1s;
}
.recipe-card:active { background: var(--bg-card-sub); transform: scale(0.98); }
.recipe-card-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.recipe-card-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
.recipe-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.recipe-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 12px;
  background: var(--bg-card-sub); color: var(--text-muted);
  border: 1px solid var(--bg-card-border);
}

/* ===== EMPTY STATE ===== */
.empty {
  color: var(--text-faint); font-size: 13px; text-align: center; padding: 30px 20px;
  background: var(--bg-empty); border-radius: 12px;
  border: 1px solid var(--bg-empty-border);
}
.recipe-count { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; padding-left: 2px; }

/* ===== SKELETON LOADING ===== */
.skeleton-card {
  background: var(--bg-card); border: 1px solid var(--bg-card-border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
}
.skeleton-line {
  height: 14px; border-radius: 7px; background: var(--bg-card-sub);
  animation: pulse 1.2s ease-in-out infinite;
}
.skeleton-line.w60 { width: 60%; height: 18px; margin-bottom: 8px; }
.skeleton-line.w40 { width: 40%; margin-bottom: 6px; }
.skeleton-line.w80 { width: 80%; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

/* ===== DETAIL VIEW ===== */
.detail-back {
  background: none; border: none; color: var(--accent); font-size: 16px; font-weight: 600;
  cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 4px;
  min-height: 44px; font-family: inherit;
}
.detail-back:active { opacity: 0.7; }
.detail-name { font-size: 24px; font-weight: 800; color: var(--text-primary); margin: 4px 0 8px; }
.detail-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 14px; color: var(--text-muted); }
.detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.detail-tag {
  font-size: 12px; padding: 4px 10px; border-radius: 14px;
  background: var(--accent-bg); color: var(--accent);
  border: 1px solid var(--accent-border); font-weight: 500;
}
.servings-card {
  background: var(--bg-card); border: 1px solid var(--bg-card-border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.servings-label { font-size: 14px; color: var(--text-muted); font-weight: 600; }
.servings-controls { display: flex; align-items: center; gap: 12px; }
.servings-btn {
  width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border-input);
  background: var(--bg-input); color: var(--text-primary); font-size: 18px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit;
}
.servings-btn:active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.servings-num { font-size: 18px; font-weight: 700; color: var(--text-primary); min-width: 24px; text-align: center; }
.detail-section-title {
  font-size: 15px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding-left: 2px;
}
.ingredient-list { margin-bottom: 20px; }
.ingredient-item {
  display: flex; gap: 10px; padding: 10px 14px;
  background: var(--bg-card-sub); border: 1px solid var(--bg-card-border);
  border-radius: 10px; margin-bottom: 4px; font-size: 15px;
}
.ingredient-amt { font-weight: 600; color: var(--accent); min-width: 60px; font-family: 'Courier New', monospace; flex-shrink: 0; }
.ingredient-name { color: var(--text-secondary); flex: 1; }
.steps-list { margin-bottom: 20px; }
.step-item { padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--bg-card-border); border-radius: 14px; margin-bottom: 8px; }
.step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.step-content { font-size: 15px; color: var(--text-secondary); line-height: 1.5; padding-left: 38px; }
.notes-card { background: var(--bg-card); border: 1px solid var(--bg-card-border); border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; }
.notes-textarea {
  width: 100%; min-height: 80px; padding: 10px 12px; border: 1px solid var(--border-input);
  border-radius: 10px; background: var(--bg-input); color: var(--text-primary);
  font-size: 15px; font-family: inherit; outline: none; resize: vertical; -webkit-appearance: none;
}
.notes-textarea::placeholder { color: var(--text-faint); }
.notes-textarea:focus { border-color: var(--accent); }
.notes-save { margin-top: 8px; padding: 10px 20px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.notes-save:active { opacity: 0.8; }
.add-shopping-btn {
  display: block; width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: var(--accent); color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; text-align: center; font-family: inherit; margin-bottom: 16px;
}
.add-shopping-btn:active { opacity: 0.8; }
.delete-recipe-btn {
  display: block; width: 100%; padding: 14px; margin-bottom: 20px;
  background: var(--danger-bg); border: 1px solid var(--danger-border);
  border-radius: 10px; color: var(--danger); font-size: 14px; font-weight: 600;
  cursor: pointer; text-align: center; font-family: inherit;
}
.delete-recipe-btn:active { opacity: 0.8; }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-bar); border-top: 1px solid var(--bg-card-border);
  display: flex; justify-content: space-around;
  padding: 6px 0; padding-bottom: max(6px, env(safe-area-inset-bottom));
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 900;
}
.nav-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 10px; font-family: inherit; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  min-width: 64px; min-height: 44px; padding: 4px 0;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn:active { opacity: 0.7; }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-weight: 600; }

/* ===== OVERLAY / SHEET ===== */
.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 1000; }
.overlay.show { display: flex; align-items: flex-end; }
.sheet {
  width: 100%; max-width: 640px; margin: 0 auto;
  background: var(--bg-sheet); border-radius: 16px 16px 0 0;
  padding: 20px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom));
  max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.sheet-title { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 4px; color: var(--text-primary); }
.sheet-sub { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 16px; }
.sheet-cancel {
  display: block; width: 100%; margin-top: 12px; padding: 14px;
  background: var(--danger-bg); border: 1px solid var(--danger-border);
  border-radius: 10px; color: var(--danger); font-size: 15px; font-weight: 600;
  cursor: pointer; text-align: center; font-family: inherit;
}
.sheet-cancel:active { opacity: 0.8; }
.import-textarea {
  width: 100%; min-height: 200px; padding: 12px 14px; border: 1px solid var(--border-input);
  border-radius: 10px; background: var(--bg-input); color: var(--text-primary);
  font-size: 13px; font-family: 'Courier New', monospace; outline: none; resize: vertical;
  -webkit-appearance: none; margin-bottom: 12px;
}
.import-textarea::placeholder { color: var(--text-faint); }
.import-textarea:focus { border-color: var(--accent); }
.import-save {
  display: block; width: 100%; padding: 14px; background: var(--accent); border: none;
  border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.import-save:active { opacity: 0.8; }

/* ===== LOADING SPINNER ===== */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-dim); font-size: 14px; gap: 8px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--bg-card-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== SHOPPING LIST ===== */
.shopping-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
.shopping-input {
  flex: 1; padding: 12px 16px; border: 1px solid var(--border-input);
  border-radius: 12px; font-size: 16px; outline: none;
  background: var(--bg-input); color: var(--text-primary); min-height: 48px;
  -webkit-appearance: none; font-family: inherit;
}
.shopping-input::placeholder { color: var(--text-faint); }
.shopping-input:focus { border-color: var(--accent); }
.shopping-add-btn {
  padding: 12px 16px; border: none; border-radius: 12px;
  background: var(--accent); color: #fff; font-size: 16px;
  font-weight: 700; cursor: pointer; min-height: 48px; min-width: 56px; font-family: inherit;
}
.shopping-add-btn:active { opacity: 0.8; }
.shopping-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.shopping-action-btn {
  flex: 1; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center; font-family: inherit;
  border: 1px solid var(--bg-card-border); background: var(--bg-card-sub); color: var(--text-muted);
}
.shopping-action-btn:active { opacity: 0.7; }
.shopping-action-btn.danger { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger); }
.aisle-group { margin-bottom: 16px; }
.aisle-header {
  font-size: 13px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 4px 2px 6px; display: flex; align-items: center; gap: 6px;
}
.aisle-icon { font-size: 16px; }
.aisle-count { font-size: 11px; color: var(--text-faint); font-weight: 500; margin-left: auto; text-transform: none; letter-spacing: 0; }
.shop-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--bg-card-sub);
  border: 1px solid var(--bg-card-border); border-radius: 10px;
  margin-bottom: 4px; font-size: 15px;
  cursor: pointer; -webkit-user-select: none; user-select: none;
  transition: opacity 0.2s;
}
.shop-item:active { opacity: 0.8; }
.shop-item.checked { opacity: 0.4; }
.shop-item.checked .shop-item-name, .shop-item.checked .shop-item-amt { text-decoration: line-through; }
.shop-check {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--text-dim); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent;
  transition: background 0.15s, border-color 0.15s;
}
.shop-item.checked .shop-check { background: var(--accent); border-color: var(--accent); color: #fff; }
.shop-item-amt { font-weight: 600; color: var(--accent); min-width: 50px; font-family: 'Courier New', monospace; flex-shrink: 0; font-size: 14px; }
.shop-item-name { color: var(--text-secondary); flex: 1; }
.shop-item-del {
  border: none; background: none; color: var(--text-faint); font-size: 18px;
  cursor: pointer; padding: 0; min-width: 32px; min-height: 32px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.shop-item-del:active { color: var(--danger); }
.shop-empty { color: var(--text-faint); font-size: 14px; text-align: center; padding: 40px 20px; line-height: 1.6; }

/* ===== MEAL PLANNER ===== */
.planner-week-nav {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 0 0 14px; margin-bottom: 4px;
}
.planner-nav-btn {
  background: none; border: none; color: var(--text-dim); font-size: 20px;
  cursor: pointer; min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.planner-nav-btn:active { color: var(--text-primary); }
.planner-week-label { font-size: 14px; font-weight: 600; color: var(--text-muted); min-width: 180px; text-align: center; }
.planner-day {
  background: var(--bg-card); border: 1px solid var(--bg-card-border);
  border-radius: 14px; padding: 12px 14px; margin-bottom: 8px;
}
.planner-day-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
}
.planner-day-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.planner-day-date { font-size: 12px; color: var(--text-dim); }
.planner-add-btn {
  background: none; border: 1px dashed var(--text-faint); border-radius: 8px;
  color: var(--text-faint); font-size: 13px; font-weight: 500; padding: 8px;
  cursor: pointer; width: 100%; text-align: center; font-family: inherit;
  min-height: 40px; display: flex; align-items: center; justify-content: center; gap: 4px;
}
.planner-add-btn:active { border-color: var(--accent); color: var(--accent); }
.planner-recipe {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; background: var(--bg-card-sub); border: 1px solid var(--bg-card-border);
  border-radius: 8px; margin-bottom: 4px; cursor: pointer;
}
.planner-recipe:active { opacity: 0.7; }
.planner-recipe-name { flex: 1; font-size: 14px; color: var(--text-secondary); font-weight: 500; }
.planner-recipe-remove {
  border: none; background: none; color: var(--text-faint); font-size: 16px;
  cursor: pointer; padding: 0; min-width: 28px; min-height: 28px;
  display: flex; align-items: center; justify-content: center;
}
.planner-recipe-remove:active { color: var(--danger); }
.planner-bulk-btn {
  display: block; width: 100%; padding: 14px; border: none; border-radius: 14px;
  background: var(--accent); color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; text-align: center; font-family: inherit; margin-top: 8px;
}
.planner-bulk-btn:active { opacity: 0.8; }

/* Recipe picker in planner sheet */
.picker-search {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border-input);
  border-radius: 10px; background: var(--bg-input); color: var(--text-primary);
  font-size: 15px; outline: none; margin-bottom: 12px; font-family: inherit;
  -webkit-appearance: none;
}
.picker-search::placeholder { color: var(--text-faint); }
.picker-search:focus { border-color: var(--accent); }

<!-- ===== APP SCRIPT ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, setDoc, doc, query, orderBy, Timestamp, onSnapshot, writeBatch }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ===== FIREBASE CONFIG =====
var firebaseConfig = {
  apiKey: "AIzaSyBTuu9vZ8No85Ju_KAgzUnFKhz2DG9WhMs",
  authDomain: "brads-home-apps.firebaseapp.com",
  projectId: "brads-home-apps",
  storageBucket: "brads-home-apps.firebasestorage.app",
  messagingSenderId: "676162099266",
  appId: "1:676162099266:web:ae638bf239bfce054735db"
};

var app = initializeApp(firebaseConfig);
var db = getFirestore(app);

// ===== CONSTANTS =====
var TAG_OPTIONS = {
  method: ["Blackstone", "Recteq", "Crockpot", "Stovetop", "Oven", "Air Fryer"],
  protein: ["Chicken", "Beef", "Pork", "Seafood", "Vegetarian"],
  cuisine: ["Asian", "Mexican", "American", "Italian", "Indian", "Other"]
};
var TAG_LABELS = { method: "Method", protein: "Protein", cuisine: "Cuisine" };
var AISLES = [
  { key: "Produce", name: "Produce", icon: "\u{1F96C}" },
  { key: "Meat", name: "Meat & Seafood", icon: "\u{1F969}" },
  { key: "Dairy", name: "Dairy", icon: "\u{1F9C0}" },
  { key: "Bakery/Bread", name: "Bakery & Bread", icon: "\u{1F35E}" },
  { key: "Pantry/Dry Goods", name: "Pantry & Dry Goods", icon: "\u{1F96B}" },
  { key: "Spices/Seasonings", name: "Spices & Seasonings", icon: "\u{1F9C2}" },
  { key: "Sauces/Condiments", name: "Sauces & Condiments", icon: "\u{1F9CB}" },
  { key: "Frozen", name: "Frozen", icon: "\u{1F9CA}" },
  { key: "Other", name: "Other", icon: "\u{1F4E6}" }
];
var DAY_NAMES = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
var DAY_SHORT = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

// ===== STATE =====
var allRecipes = [];
var searchText = "";
var activeFilters = { method: [], protein: [], cuisine: [] };
var currentView = "home";
var detailRecipeId = null;
var detailServings = 4;
var isLoading = true;
var shoppingItems = [];
var shopUnsub = null;
var plannerWeekOffset = 0;
var mealPlanData = {};
var planUnsub = null;
var pickerDay = null;

// ===== HELPERS =====
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function esc(s) {
  if (!s) return "";
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

var toastTimer = null;
function flash(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + (type || "ok") + " show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove("show"); }, 2500);
}

function toFraction(decimal) {
  if (decimal === 0) return "";
  if (decimal < 0) return "";
  var whole = Math.floor(decimal);
  var frac = decimal - whole;
  var fracs = [
    [0.125, "\u215B"], [0.25, "\u00BC"], [0.333, "\u2153"], [0.375, "\u215C"],
    [0.5, "\u00BD"], [0.625, "\u215D"], [0.667, "\u2154"], [0.75, "\u00BE"], [0.875, "\u215E"]
  ];
  var best = "";
  var bestDiff = 0.05;
  for (var i = 0; i < fracs.length; i++) {
    var diff = Math.abs(frac - fracs[i][0]);
    if (diff < bestDiff) { bestDiff = diff; best = fracs[i][1]; }
  }
  if (whole && best) return whole + " " + best;
  if (best) return best;
  if (whole) return "" + whole;
  var rounded = Math.round(decimal * 100) / 100;
  var str = rounded.toString();
  if (str.indexOf(".") !== -1) str = str.replace(/\.?0+$/, "");
  return str || "0";
}

function scaledAmount(ingredient, baseServings, currentServings) {
  if (!ingredient.amount) return "";
  return toFraction((ingredient.amount / baseServings) * currentServings);
}

function getAllTags(recipe) {
  var tags = [];
  if (recipe.tags) {
    if (recipe.tags.method) tags = tags.concat(recipe.tags.method);
    if (recipe.tags.protein) tags = tags.concat(recipe.tags.protein);
    if (recipe.tags.cuisine) tags = tags.concat(recipe.tags.cuisine);
  }
  return tags;
}

function getFilteredRecipes() {
  return allRecipes.filter(function(r) {
    if (searchText) {
      var q = searchText.toLowerCase();
      var nameMatch = r.name && r.name.toLowerCase().indexOf(q) !== -1;
      var tagMatch = false;
      var tags = getAllTags(r);
      for (var t = 0; t < tags.length; t++) { if (tags[t].toLowerCase().indexOf(q) !== -1) { tagMatch = true; break; } }
      var ingredientMatch = false;
      if (r.ingredients) {
        for (var ing = 0; ing < r.ingredients.length; ing++) {
          if (r.ingredients[ing].name && r.ingredients[ing].name.toLowerCase().indexOf(q) !== -1) { ingredientMatch = true; break; }
        }
      }
      if (!nameMatch && !tagMatch && !ingredientMatch) return false;
    }
    var types = ["method", "protein", "cuisine"];
    for (var f = 0; f < types.length; f++) {
      var type = types[f];
      if (activeFilters[type].length > 0) {
        var recipeTags = (r.tags && r.tags[type]) || [];
        var match = false;
        for (var i = 0; i < activeFilters[type].length; i++) { if (recipeTags.indexOf(activeFilters[type][i]) !== -1) { match = true; break; } }
        if (!match) return false;
      }
    }
    return true;
  });
}

function normalizeIngName(name) {
  return (name || "").toLowerCase().trim().replace(/,\s.*$/, "").replace(/\s*\(.*?\)\s*/g, "").replace(/\s+/g, " ");
}

// Week helpers
function getWeekStart(offset) {
  var d = new Date();
  var day = d.getDay();
  var diff = d.getDate() - day + (day === 0 ? -6 : 1) + (offset * 7);
  var mon = new Date(d.getFullYear(), d.getMonth(), diff);
  mon.setHours(0, 0, 0, 0);
  return mon;
}

function weekKey(offset) {
  var d = getWeekStart(offset);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function weekLabel(offset) {
  var start = getWeekStart(offset);
  var end = new Date(start); end.setDate(end.getDate() + 6);
  var opts = { month: 'short', day: 'numeric' };
  return start.toLocaleDateString('en-US', opts) + ' - ' + end.toLocaleDateString('en-US', opts);
}

function getRecipeById(id) {
  for (var i = 0; i < allRecipes.length; i++) { if (allRecipes[i].id === id) return allRecipes[i]; }
  return null;
}

// ===== THEME =====
var metaTheme = document.querySelector('meta[name="theme-color"]');
function updateThemeColor() {
  metaTheme.setAttribute("content", window.matchMedia("(prefers-color-scheme: light)").matches ? "#f8fafc" : "#0b1121");
}
updateThemeColor();
window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", updateThemeColor);

// ===== OFFLINE DETECTION =====
function updateOnlineStatus() {
  document.getElementById("offlineBanner").classList.toggle("show", !navigator.onLine);
}
window.addEventListener("online", updateOnlineStatus);
window.addEventListener("offline", updateOnlineStatus);
updateOnlineStatus();

// ===== FIREBASE: RECIPES =====
async function loadRecipes() {
  try {
    var snap = await getDocs(query(collection(db, "recipes"), orderBy("createdAt", "desc")));
    allRecipes = [];
    snap.forEach(function(d) { var r = d.data(); r.id = d.id; allRecipes.push(r); });
    // Cache for offline
    try { localStorage.setItem("recipesCache", JSON.stringify(allRecipes)); } catch(e) {}
  } catch(e) {
    console.error("Error loading recipes:", e);
    // Try offline cache
    try {
      var cached = localStorage.getItem("recipesCache");
      if (cached) { allRecipes = JSON.parse(cached); flash("Loaded from cache (offline)"); }
      else { flash("Error loading recipes", "err"); }
    } catch(e2) { flash("Error loading recipes", "err"); }
  }
}

async function saveNote(recipeId, noteText) {
  try {
    await updateDoc(doc(db, "recipes", recipeId), { notes: noteText });
    for (var i = 0; i < allRecipes.length; i++) { if (allRecipes[i].id === recipeId) { allRecipes[i].notes = noteText; break; } }
    flash("Notes saved");
  } catch(e) { flash("Error saving notes", "err"); }
}

async function deleteRecipe(recipeId) {
  try {
    await deleteDoc(doc(db, "recipes", recipeId));
    allRecipes = allRecipes.filter(function(r) { return r.id !== recipeId; });
    flash("Recipe deleted");
    navigate("home");
  } catch(e) { flash("Error deleting recipe", "err"); }
}

async function importRecipes() {
  var raw = document.getElementById("importText").value.trim();
  if (!raw) { flash("Paste JSON first", "err"); return; }
  try {
    var recipes = JSON.parse(raw);
    if (!Array.isArray(recipes)) recipes = [recipes];
    var count = 0;
    for (var i = 0; i < recipes.length; i++) {
      var r = recipes[i];
      if (!r.name) continue;
      var recipeDoc = {
        name: r.name, cookTime: r.cookTime || "", baseServings: r.baseServings || 4,
        tags: {
          method: Array.isArray(r.tags && r.tags.method) ? r.tags.method : [],
          protein: Array.isArray(r.tags && r.tags.protein) ? r.tags.protein : [],
          cuisine: Array.isArray(r.tags && r.tags.cuisine) ? r.tags.cuisine : []
        },
        ingredients: Array.isArray(r.ingredients) ? r.ingredients.map(function(ing) {
          return { id: ing.id || genId(), name: ing.name || "", amount: ing.amount || 0, unit: ing.unit || "", aisle: ing.aisle || "Other" };
        }) : [],
        steps: Array.isArray(r.steps) ? r.steps.map(function(s, idx) {
          return { stepNumber: s.stepNumber || (idx + 1), title: s.title || "", content: s.content || "" };
        }) : [],
        notes: r.notes || "", imageUrl: r.imageUrl || "", createdAt: Timestamp.now()
      };
      await addDoc(collection(db, "recipes"), recipeDoc);
      count++;
    }
    flash(count + " recipe" + (count !== 1 ? "s" : "") + " imported");
    document.getElementById("importText").value = "";
    closeOverlay("importOverlay");
    await loadRecipes();
    renderHome();
  } catch(e) { flash("Invalid JSON: " + e.message, "err"); }
}

// ===== FIREBASE: SHOPPING LIST =====
function startShoppingSync() {
  if (shopUnsub) return;
  shopUnsub = onSnapshot(collection(db, "shoppingList"), function(snap) {
    shoppingItems = [];
    snap.forEach(function(d) { var item = d.data(); item.id = d.id; shoppingItems.push(item); });
    if (currentView === "shopping") renderShopping();
  }, function(err) { console.error("Shopping sync error:", err); });
}

async function addToShoppingList(ingredients, recipeName, baseServings, currentServings) {
  var added = 0, merged = 0;
  for (var i = 0; i < ingredients.length; i++) {
    var ing = ingredients[i];
    var scaledAmt = (ing.amount / baseServings) * currentServings;
    var normName = normalizeIngName(ing.name);
    var found = false;
    for (var j = 0; j < shoppingItems.length; j++) {
      var existing = shoppingItems[j];
      if (!existing.checked && normalizeIngName(existing.name) === normName && existing.unit === ing.unit) {
        await updateDoc(doc(db, "shoppingList", existing.id), { amount: (existing.amount || 0) + scaledAmt });
        existing.amount = (existing.amount || 0) + scaledAmt;
        merged++; found = true; break;
      }
    }
    if (!found) {
      var newItem = { name: ing.name, amount: scaledAmt, unit: ing.unit || "", aisle: ing.aisle || "Other", checked: false, source: recipeName || "manual", createdAt: Timestamp.now() };
      var docRef = await addDoc(collection(db, "shoppingList"), newItem);
      newItem.id = docRef.id;
      shoppingItems.push(newItem);
      added++;
    }
  }
  var msg = added + " added";
  if (merged > 0) msg += ", " + merged + " merged";
  flash(msg);
}

async function addManualShopItem(text) {
  if (!text.trim()) return;
  try { await addDoc(collection(db, "shoppingList"), { name: text.trim(), amount: 0, unit: "", aisle: "Other", checked: false, source: "manual", createdAt: Timestamp.now() }); }
  catch(e) { flash("Error adding item", "err"); }
}

async function toggleShopItem(itemId) {
  var item = null;
  for (var i = 0; i < shoppingItems.length; i++) { if (shoppingItems[i].id === itemId) { item = shoppingItems[i]; break; } }
  if (item) { try { await updateDoc(doc(db, "shoppingList", itemId), { checked: !item.checked }); } catch(e) {} }
}

async function deleteShopItem(itemId) { try { await deleteDoc(doc(db, "shoppingList", itemId)); } catch(e) {} }

async function clearCheckedItems() {
  var checked = shoppingItems.filter(function(it) { return it.checked; });
  if (checked.length === 0) { flash("Nothing to clear"); return; }
  var batch = writeBatch(db);
  for (var i = 0; i < checked.length; i++) batch.delete(doc(db, "shoppingList", checked[i].id));
  try { await batch.commit(); flash(checked.length + " cleared"); } catch(e) { flash("Error clearing", "err"); }
}

async function clearAllItems() {
  if (shoppingItems.length === 0) { flash("List is empty"); return; }
  if (!confirm("Clear entire shopping list?")) return;
  var batch = writeBatch(db);
  for (var i = 0; i < shoppingItems.length; i++) batch.delete(doc(db, "shoppingList", shoppingItems[i].id));
  try { await batch.commit(); flash("List cleared"); } catch(e) { flash("Error clearing", "err"); }
}

// ===== FIREBASE: MEAL PLANNER =====
function startPlannerSync() {
  if (planUnsub) return;
  planUnsub = onSnapshot(collection(db, "mealPlan"), function(snap) {
    mealPlanData = {};
    snap.forEach(function(d) { mealPlanData[d.id] = d.data(); });
    if (currentView === "planner") renderPlanner();
  }, function(err) { console.error("Planner sync error:", err); });
}

function getPlanForWeek(wk) {
  var plan = mealPlanData[wk];
  if (!plan) return {};
  return plan.slots || {};
}

async function addRecipeToDay(wk, dayIdx, recipeId) {
  var plan = mealPlanData[wk] || { slots: {} };
  var slots = plan.slots || {};
  var dayKey = "" + dayIdx;
  var daySlots = slots[dayKey] || [];
  daySlots.push(recipeId);
  slots[dayKey] = daySlots;
  await setDoc(doc(db, "mealPlan", wk), { slots: slots, updatedAt: Timestamp.now() }, { merge: true });
}

async function removeRecipeFromDay(wk, dayIdx, recipeIdx) {
  var plan = mealPlanData[wk];
  if (!plan || !plan.slots) return;
  var dayKey = "" + dayIdx;
  var daySlots = plan.slots[dayKey] || [];
  daySlots.splice(recipeIdx, 1);
  plan.slots[dayKey] = daySlots;
  await setDoc(doc(db, "mealPlan", wk), { slots: plan.slots, updatedAt: Timestamp.now() }, { merge: true });
}

async function addWeekToShoppingList() {
  var wk = weekKey(plannerWeekOffset);
  var slots = getPlanForWeek(wk);
  var allIngs = [];
  var recipeCount = 0;
  for (var dayIdx = 0; dayIdx < 7; dayIdx++) {
    var daySlots = slots["" + dayIdx] || [];
    for (var s = 0; s < daySlots.length; s++) {
      var recipe = getRecipeById(daySlots[s]);
      if (recipe && recipe.ingredients) {
        recipeCount++;
        for (var k = 0; k < recipe.ingredients.length; k++) {
          allIngs.push({ name: recipe.ingredients[k].name, amount: recipe.ingredients[k].amount, unit: recipe.ingredients[k].unit, aisle: recipe.ingredients[k].aisle, _base: recipe.baseServings || 4 });
        }
      }
    }
  }
  if (allIngs.length === 0) { flash("No recipes planned this week"); return; }
  // Use addToShoppingList with base=base, current=base (no scaling for planner)
  var added = 0, merged = 0;
  for (var i = 0; i < allIngs.length; i++) {
    var ing = allIngs[i];
    var normName = normalizeIngName(ing.name);
    var found = false;
    for (var j = 0; j < shoppingItems.length; j++) {
      var existing = shoppingItems[j];
      if (!existing.checked && normalizeIngName(existing.name) === normName && existing.unit === ing.unit) {
        await updateDoc(doc(db, "shoppingList", existing.id), { amount: (existing.amount || 0) + ing.amount });
        existing.amount = (existing.amount || 0) + ing.amount;
        merged++; found = true; break;
      }
    }
    if (!found) {
      var newItem = { name: ing.name, amount: ing.amount, unit: ing.unit || "", aisle: ing.aisle || "Other", checked: false, source: "meal plan", createdAt: Timestamp.now() };
      var docRef = await addDoc(collection(db, "shoppingList"), newItem);
      newItem.id = docRef.id;
      shoppingItems.push(newItem);
      added++;
    }
  }
  flash(recipeCount + " recipes: " + added + " added" + (merged > 0 ? ", " + merged + " merged" : ""));
}

// ===== NAVIGATION =====
var views = ["home", "detail", "shopping", "planner", "random"];

function navigate(view, params) {
  currentView = view;
  for (var i = 0; i < views.length; i++) {
    document.getElementById("view-" + views[i]).style.display = views[i] === view ? "block" : "none";
  }
  var btns = document.querySelectorAll(".nav-btn");
  for (var j = 0; j < btns.length; j++) {
    var bv = btns[j].getAttribute("data-view");
    btns[j].classList.toggle("active", bv === (view === "detail" ? "home" : view));
  }
  document.getElementById("bottomNav").style.display = view === "detail" ? "none" : "flex";
  document.body.style.paddingBottom = view === "detail" ? "16px" : "calc(72px + env(safe-area-inset-bottom))";
  window.scrollTo(0, 0);
  if (view === "home") renderHome();
  if (view === "detail") renderDetail(params);
  if (view === "shopping") renderShopping();
  if (view === "planner") renderPlanner();
  if (view === "random") renderRandom();
}

function openOverlay(id) { document.getElementById(id).classList.add("show"); }
function closeOverlay(id) { document.getElementById(id).classList.remove("show"); }

// ===== RENDER: HOME =====
function renderHome() {
  var filterHtml = "";
  var types = ["method", "protein", "cuisine"];
  for (var t = 0; t < types.length; t++) {
    var type = types[t];
    filterHtml += '<div class="filter-section"><div class="filter-label">' + esc(TAG_LABELS[type]) + '</div><div class="filter-row">';
    var opts = TAG_OPTIONS[type];
    for (var o = 0; o < opts.length; o++) {
      var isActive = activeFilters[type].indexOf(opts[o]) !== -1;
      filterHtml += '<button class="filter-pill' + (isActive ? ' active' : '') + '" data-type="' + type + '" data-val="' + esc(opts[o]) + '">' + esc(opts[o]) + '</button>';
    }
    filterHtml += '</div></div>';
  }
  document.getElementById("filterArea").innerHTML = filterHtml;
  var filtered = getFilteredRecipes();
  var countEl = document.getElementById("recipeCount");
  if (allRecipes.length === 0 && !isLoading) { countEl.textContent = ""; }
  else if (filtered.length === allRecipes.length) { countEl.textContent = filtered.length + " recipe" + (filtered.length !== 1 ? "s" : ""); }
  else { countEl.textContent = filtered.length + " of " + allRecipes.length + " recipes"; }
  var listEl = document.getElementById("recipeList");
  if (isLoading) {
    listEl.innerHTML = '<div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div></div>'.repeat(3);
    return;
  }
  if (allRecipes.length === 0) { listEl.innerHTML = '<div class="empty">No recipes yet. Tap + to import your first recipe.</div>'; return; }
  if (filtered.length === 0) { listEl.innerHTML = '<div class="empty">No recipes match your filters.</div>'; return; }
  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    var tags = getAllTags(r);
    html += '<div class="recipe-card" data-id="' + r.id + '">';
    html += '<div class="recipe-card-name">' + esc(r.name) + '</div>';
    if (r.cookTime) {
      html += '<div class="recipe-card-meta"><span>&#x23F1; ' + esc(r.cookTime) + '</span>';
      if (r.baseServings) html += '<span>&#x1F37D; ' + r.baseServings + ' servings</span>';
      html += '</div>';
    }
    if (tags.length > 0) {
      html += '<div class="recipe-card-tags">';
      for (var j = 0; j < tags.length; j++) html += '<span class="recipe-tag">' + esc(tags[j]) + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  listEl.innerHTML = html;
}

// ===== RENDER: DETAIL =====
function renderDetail(recipeId) {
  detailRecipeId = recipeId;
  var r = getRecipeById(recipeId);
  if (!r) { document.getElementById("view-detail").innerHTML = '<div class="empty">Recipe not found.</div>'; return; }
  detailServings = r.baseServings || 4;
  renderDetailContent(r);
}

function renderDetailContent(r) {
  var base = r.baseServings || 4;
  var html = '<button class="detail-back" id="detailBack">&#x25C0; Back</button>';
  html += '<div class="detail-name">' + esc(r.name) + '</div>';
  html += '<div class="detail-meta">';
  if (r.cookTime) html += '<span>&#x23F1; ' + esc(r.cookTime) + '</span>';
  html += '</div>';
  var tags = getAllTags(r);
  if (tags.length > 0) {
    html += '<div class="detail-tags">';
    for (var t = 0; t < tags.length; t++) html += '<span class="detail-tag">' + esc(tags[t]) + '</span>';
    html += '</div>';
  }
  html += '<div class="servings-card"><span class="servings-label">Servings</span><div class="servings-controls">';
  html += '<button class="servings-btn" id="servMinus">-</button><span class="servings-num" id="servNum">' + detailServings + '</span><button class="servings-btn" id="servPlus">+</button>';
  html += '</div></div>';
  if (r.ingredients && r.ingredients.length > 0) {
    html += '<div class="detail-section-title">Ingredients</div><div class="ingredient-list">';
    for (var i = 0; i < r.ingredients.length; i++) {
      var ing = r.ingredients[i];
      var amt = scaledAmount(ing, base, detailServings);
      var unitStr = ing.unit ? " " + esc(ing.unit) : "";
      html += '<div class="ingredient-item"><span class="ingredient-amt">' + amt + unitStr + '</span><span class="ingredient-name">' + esc(ing.name) + '</span></div>';
    }
    html += '</div>';
  }
  if (r.steps && r.steps.length > 0) {
    html += '<div class="detail-section-title">Instructions</div><div class="steps-list">';
    for (var s = 0; s < r.steps.length; s++) {
      var step = r.steps[s];
      html += '<div class="step-item"><div class="step-header"><span class="step-num">' + (step.stepNumber || (s + 1)) + '</span>';
      if (step.title) html += '<span class="step-title">' + esc(step.title) + '</span>';
      html += '</div>';
      if (step.content) html += '<div class="step-content">' + esc(step.content) + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }
  html += '<div class="detail-section-title">Notes</div><div class="notes-card">';
  html += '<textarea class="notes-textarea" id="notesText" placeholder="Add personal notes, tweaks, substitutions...">' + esc(r.notes || "") + '</textarea>';
  html += '<button class="notes-save" id="notesSave">Save Notes</button></div>';
  html += '<button class="add-shopping-btn" id="addShoppingBtn">&#x1F6D2; Add Ingredients to Shopping List</button>';
  html += '<button class="delete-recipe-btn" id="deleteRecipeBtn">Delete Recipe</button>';
  document.getElementById("view-detail").innerHTML = html;

  document.getElementById("detailBack").addEventListener("click", function() { navigate("home"); });
  document.getElementById("servMinus").addEventListener("click", function() { if (detailServings > 1) { detailServings--; renderDetailContent(r); } });
  document.getElementById("servPlus").addEventListener("click", function() { detailServings++; renderDetailContent(r); });
  document.getElementById("notesSave").addEventListener("click", function() { saveNote(r.id, document.getElementById("notesText").value); });
  document.getElementById("addShoppingBtn").addEventListener("click", function() {
    if (!r.ingredients || r.ingredients.length === 0) { flash("No ingredients to add", "err"); return; }
    addToShoppingList(r.ingredients, r.name, base, detailServings);
  });
  document.getElementById("deleteRecipeBtn").addEventListener("click", function() {
    if (confirm("Delete \"" + r.name + "\"? This cannot be undone.")) deleteRecipe(r.id);
  });
}

// ===== RENDER: SHOPPING =====
function renderShopping() {
  var listEl = document.getElementById("shopList");
  var actionsEl = document.getElementById("shopActions");
  if (shoppingItems.length === 0) {
    actionsEl.style.display = "none";
    listEl.innerHTML = '<div class="shop-empty">Your shopping list is empty.<br>Add ingredients from a recipe or type an item above.</div>';
    return;
  }
  actionsEl.style.display = "flex";
  var groups = {};
  for (var i = 0; i < shoppingItems.length; i++) {
    var aisle = shoppingItems[i].aisle || "Other";
    if (!groups[aisle]) groups[aisle] = [];
    groups[aisle].push(shoppingItems[i]);
  }
  var html = "";
  for (var a = 0; a < AISLES.length; a++) {
    var items = groups[AISLES[a].key];
    if (!items || items.length === 0) continue;
    items.sort(function(x, y) {
      if (x.checked !== y.checked) return x.checked ? 1 : -1;
      return (x.name || "").localeCompare(y.name || "");
    });
    var unchecked = items.filter(function(it) { return !it.checked; }).length;
    html += '<div class="aisle-group"><div class="aisle-header"><span class="aisle-icon">' + AISLES[a].icon + '</span> ' + esc(AISLES[a].name);
    html += '<span class="aisle-count">' + unchecked + ' item' + (unchecked !== 1 ? 's' : '') + '</span></div>';
    for (var j = 0; j < items.length; j++) {
      var it = items[j];
      var amtStr = "";
      if (it.amount) { amtStr = toFraction(it.amount); if (it.unit) amtStr += " " + esc(it.unit); }
      html += '<div class="shop-item' + (it.checked ? ' checked' : '') + '" data-shopid="' + it.id + '">';
      html += '<div class="shop-check">' + (it.checked ? '\u2713' : '') + '</div>';
      if (amtStr) html += '<span class="shop-item-amt">' + amtStr + '</span>';
      html += '<span class="shop-item-name">' + esc(it.name) + '</span>';
      html += '<button class="shop-item-del" data-delid="' + it.id + '">\u00D7</button></div>';
    }
    html += '</div>';
  }
  listEl.innerHTML = html;
}

// ===== RENDER: PLANNER =====
function renderPlanner() {
  var wk = weekKey(plannerWeekOffset);
  document.getElementById("plannerWeekLabel").textContent = weekLabel(plannerWeekOffset);
  var slots = getPlanForWeek(wk);
  var start = getWeekStart(plannerWeekOffset);
  var html = "";
  for (var d = 0; d < 7; d++) {
    var dayDate = new Date(start);
    dayDate.setDate(dayDate.getDate() + d);
    var dateStr = dayDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    var daySlots = slots["" + d] || [];
    var isToday = dayDate.toDateString() === new Date().toDateString();
    html += '<div class="planner-day" style="' + (isToday ? 'border-color: var(--accent);' : '') + '">';
    html += '<div class="planner-day-header"><span class="planner-day-name">' + (isToday ? '&#x1F4CD; ' : '') + DAY_NAMES[d] + '</span>';
    html += '<span class="planner-day-date">' + dateStr + '</span></div>';
    for (var s = 0; s < daySlots.length; s++) {
      var recipe = getRecipeById(daySlots[s]);
      var rName = recipe ? recipe.name : "(deleted recipe)";
      html += '<div class="planner-recipe" data-rid="' + daySlots[s] + '">';
      html += '<span class="planner-recipe-name">' + esc(rName) + '</span>';
      html += '<button class="planner-recipe-remove" data-day="' + d + '" data-idx="' + s + '">\u00D7</button></div>';
    }
    html += '<button class="planner-add-btn" data-day="' + d + '">+ Add recipe</button>';
    html += '</div>';
  }
  document.getElementById("plannerDays").innerHTML = html;
}

// Recipe picker for planner
function openRecipePicker(dayIdx) {
  pickerDay = dayIdx;
  document.getElementById("pickerSearch").value = "";
  renderPickerList("");
  openOverlay("pickerOverlay");
}

function renderPickerList(q) {
  var filtered = allRecipes.filter(function(r) {
    if (!q) return true;
    return r.name.toLowerCase().indexOf(q.toLowerCase()) !== -1;
  });
  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    html += '<div class="picker-item" data-pickid="' + r.id + '">';
    html += '<div class="picker-item-name">' + esc(r.name) + '</div>';
    var meta = [];
    if (r.cookTime) meta.push(r.cookTime);
    var tags = getAllTags(r);
    if (tags.length > 0) meta.push(tags.join(', '));
    if (meta.length > 0) html += '<div class="picker-item-meta">' + esc(meta.join(' \u00B7 ')) + '</div>';
    html += '</div>';
  }
  if (filtered.length === 0) html = '<div class="empty">No recipes found.</div>';
  document.getElementById("pickerList").innerHTML = html;
}

// ===== RENDER: RANDOM =====
function renderRandom() {
  var filtersHtml = '';
  var types = ["method", "protein", "cuisine"];
  for (var t = 0; t < types.length; t++) {
    var type = types[t];
    filtersHtml += '<div class="filter-section"><div class="filter-label">' + esc(TAG_LABELS[type]) + '</div><div class="filter-row">';
    var opts = TAG_OPTIONS[type];
    for (var o = 0; o < opts.length; o++) {
      var isActive = activeFilters[type].indexOf(opts[o]) !== -1;
      filtersHtml += '<button class="filter-pill' + (isActive ? ' active' : '') + '" data-type="' + type + '" data-val="' + esc(opts[o]) + '">' + esc(opts[o]) + '</button>';
    }
    filtersHtml += '</div></div>';
  }
  document.getElementById("randomFilters").innerHTML = filtersHtml;
}

// ===== EVENT LISTENERS =====

// Nav buttons
document.querySelectorAll(".nav-btn").forEach(function(btn) {
  btn.addEventListener("click", function() { var view = this.getAttribute("data-view"); if (view) navigate(view); });
});

// Search
document.getElementById("searchInput").addEventListener("input", function() { searchText = this.value; renderHome(); });

// Filter pills (delegated)
document.addEventListener("click", function(e) {
  var pill = e.target.closest(".filter-pill");
  if (pill) {
    var type = pill.getAttribute("data-type");
    var val = pill.getAttribute("data-val");
    if (type && val) {
      var idx = activeFilters[type].indexOf(val);
      if (idx === -1) activeFilters[type].push(val);
      else activeFilters[type].splice(idx, 1);
      if (currentView === "home") renderHome();
      if (currentView === "random") renderRandom();
    }
  }
});

// Recipe card click
document.getElementById("recipeList").addEventListener("click", function(e) {
  var card = e.target.closest(".recipe-card");
  if (card) { var id = card.getAttribute("data-id"); if (id) navigate("detail", id); }
});

// Import
document.getElementById("importBtn").addEventListener("click", function() { openOverlay("importOverlay"); });
document.getElementById("importCancel").addEventListener("click", function() { closeOverlay("importOverlay"); });
document.getElementById("importSave").addEventListener("click", function() { importRecipes(); });
document.getElementById("importOverlay").addEventListener("click", function(e) { if (e.target === this) closeOverlay("importOverlay"); });

// Shopping list
document.getElementById("shopManualAdd").addEventListener("click", function() {
  var input = document.getElementById("shopManualInput");
  addManualShopItem(input.value); input.value = "";
});
document.getElementById("shopManualInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") { e.preventDefault(); addManualShopItem(this.value); this.value = ""; }
});
document.getElementById("shopClearChecked").addEventListener("click", function() { clearCheckedItems(); });
document.getElementById("shopClearAll").addEventListener("click", function() { clearAllItems(); });
document.getElementById("shopList").addEventListener("click", function(e) {
  var delBtn = e.target.closest(".shop-item-del");
  if (delBtn) { var delId = delBtn.getAttribute("data-delid"); if (delId) deleteShopItem(delId); return; }
  var item = e.target.closest(".shop-item");
  if (item) { var shopId = item.getAttribute("data-shopid"); if (shopId) toggleShopItem(shopId); }
});

// Planner navigation
document.getElementById("plannerPrev").addEventListener("click", function() { plannerWeekOffset--; renderPlanner(); });
document.getElementById("plannerNext").addEventListener("click", function() { plannerWeekOffset++; renderPlanner(); });

// Planner day interactions (delegated)
document.getElementById("plannerDays").addEventListener("click", function(e) {
  // Remove recipe from day
  var removeBtn = e.target.closest(".planner-recipe-remove");
  if (removeBtn) {
    var day = parseInt(removeBtn.getAttribute("data-day"));
    var idx = parseInt(removeBtn.getAttribute("data-idx"));
    removeRecipeFromDay(weekKey(plannerWeekOffset), day, idx);
    return;
  }
  // Open recipe detail from planner
  var recipeEl = e.target.closest(".planner-recipe");
  if (recipeEl && !e.target.closest(".planner-recipe-remove")) {
    var rid = recipeEl.getAttribute("data-rid");
    if (rid && getRecipeById(rid)) navigate("detail", rid);
    return;
  }
  // Add recipe button
  var addBtn = e.target.closest(".planner-add-btn");
  if (addBtn) {
    var dayIdx = parseInt(addBtn.getAttribute("data-day"));
    openRecipePicker(dayIdx);
  }
});

// Planner bulk add
document.getElementById("plannerBulkAdd").addEventListener("click", function() { addWeekToShoppingList(); });

// Recipe picker
document.getElementById("pickerCancel").addEventListener("click", function() { closeOverlay("pickerOverlay"); });
document.getElementById("pickerOverlay").addEventListener("click", function(e) { if (e.target === this) closeOverlay("pickerOverlay"); });
document.getElementById("pickerSearch").addEventListener("input", function() { renderPickerList(this.value); });
document.getElementById("pickerList").addEventListener("click", function(e) {
  var item = e.target.closest(".picker-item");
  if (item) {
    var recipeId = item.getAttribute("data-pickid");
    if (recipeId && pickerDay !== null) {
      addRecipeToDay(weekKey(plannerWeekOffset), pickerDay, recipeId);
      closeOverlay("pickerOverlay");
      pickerDay = null;
    }
  }
});

// Random button
document.getElementById("randomBtn").addEventListener("click", function() {
  var filtered = getFilteredRecipes();
  if (filtered.length === 0) { flash("No recipes match your filters", "err"); return; }
  var pick = filtered[Math.floor(Math.random() * filtered.length)];
  var html = '<div class="recipe-card" data-id="' + pick.id + '" id="randomCard">';
  html += '<div class="recipe-card-name">' + esc(pick.name) + '</div>';
  if (pick.cookTime) html += '<div class="recipe-card-meta"><span>&#x23F1; ' + esc(pick.cookTime) + '</span></div>';
  var tags = getAllTags(pick);
  if (tags.length > 0) {
    html += '<div class="recipe-card-tags">';
    for (var j = 0; j < tags.length; j++) html += '<span class="recipe-tag">' + esc(tags[j]) + '</span>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById("randomResult").innerHTML = html;
  document.getElementById("randomCard").addEventListener("click", function() { navigate("detail", pick.id); });
});

// ===== INIT =====
async function init() {
  isLoading = true;
  renderHome();
  startShoppingSync();
  startPlannerSync();
  await loadRecipes();
  isLoading = false;
  if (currentView === "home") renderHome();
  if (currentView === "random") renderRandom();
  if (currentView === "planner") renderPlanner();
}

init();

</script>
</body>
</html>
